name: Fetch Market Data

on:
  schedule:
    # 正式盤：美東 09:30–16:00（UTC 13:30–20:00）每 15 分鐘
    - cron: "*/15 13-19 * * 1-5"
    - cron: "0,15,30,45 20 * * 1-5"
    # 盤前：美東 04:00–09:30（UTC 08:00–13:30）每 30 分鐘
    - cron: "0,30 8-12 * * 1-5"
    - cron: "0 13 * * 1-5"
    # 盤後：美東 16:00–20:00（UTC 20:00–00:00）每 30 分鐘
    - cron: "30 20,21,22,23 * * 1-5"
  workflow_dispatch:  # 手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market_data.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
